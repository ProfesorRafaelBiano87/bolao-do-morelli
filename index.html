<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bolão Copa 2026 - Palpite Vencedor/Empate</title>
    <!-- Bibliotecas para geração de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            padding: 30px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #fef9e8;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px 25px 40px 25px;
        }

        .header {
            text-align: center;
            border-bottom: 4px solid #ffcc00;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2.2rem;
            color: #1f3b2c;
        }
        .header h1 span {
            background: #ffcc00;
            padding: 0 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .header p {
            color: #2c5a3b;
            font-weight: 500;
            margin-top: 8px;
        }

        .user-area {
            background: #e9f0e5;
            padding: 18px 22px;
            border-radius: 36px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
        }
        .input-group {
            flex: 1;
            min-width: 200px;
        }
        .input-group label {
            font-weight: bold;
            color: #1f3b2c;
            display: block;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #bfd9b0;
            background: white;
            font-size: 1rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 0 3px rgba(255,204,0,0.3);
        }

        .resumo-card {
            background: #ffffffdd;
            border-radius: 32px;
            padding: 18px 22px;
            margin-bottom: 28px;
            border-left: 8px solid #ffcc00;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .resumo-card h3 {
            font-size: 1.5rem;
            color: #1f3b2c;
        }
        .resumo-texto {
            background: #f4f2e7;
            padding: 14px;
            border-radius: 24px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        .jogos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
            margin: 25px 0 30px;
        }
        .card-jogo {
            background: white;
            border-radius: 28px;
            padding: 14px 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            border: 1px solid #e0dccf;
        }
        .grupo-badge {
            font-size: 0.7rem;
            background: #2c5a3b;
            color: white;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .jogo-nomes {
            font-weight: 800;
            font-size: 1rem;
            margin: 8px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .time {
            background: #faf4e0;
            padding: 4px 8px;
            border-radius: 20px;
            flex: 1;
            text-align: center;
        }
        .vs {
            font-weight: bold;
            background: #ffcc00;
            padding: 4px 10px;
            border-radius: 30px;
            font-size: 0.9rem;
        }
        .opcoes-palpite {
            margin: 12px 0;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .opcao-btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 8px;
            border: 2px solid #ddd;
            background: #f9f9f9;
            border-radius: 40px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .opcao-btn.selected {
            background: #ffcc00;
            border-color: #d4a800;
            color: #1f3b2c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        .opcao-btn[data-opcao="empate"] {
            background: #e8e0c0;
        }
        .opcao-btn[data-opcao="empate"].selected {
            background: #ffcc00;
        }
        .sem-palpite {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #eee;
        }
        .sem-palpite label {
            font-size: 0.8rem;
            cursor: pointer;
            color: #666;
        }
        button {
            background: #ffcc00;
            border: none;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1f3b2c;
        }
        button:hover {
            background: #e6b800;
            transform: scale(1.01);
        }
        .btn-pdf {
            background: #1f3b2c;
            color: #ffcc00;
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            margin-top: 10px;
        }
        .btn-pdf:hover {
            background: #143120;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #5f7355;
        }
        .status-palpite {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 8px;
            color: #2c5a3b;
            font-weight: 500;
        }
        @media (max-width: 700px) {
            .container { padding: 15px; }
            .opcao-btn { font-size: 0.75rem; padding: 8px 4px; min-width: 60px; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>⚽ BOLÃO <span>COPA 2026</span> 🏆</h1>
        <p>1ª Rodada • Palpite: VENCEDOR ou EMPATE • Gere seu PDF</p>
    </div>

    <div class="user-area">
        <div class="input-group">
            <label>👤 Seu nome completo</label>
            <input type="text" id="nomeParticipante" placeholder="Ex: João Silva" autocomplete="off">
        </div>
        <div class="input-group">
            <label>📧 E-mail</label>
            <input type="email" id="emailParticipante" placeholder="joao@email.com">
        </div>
    </div>

    <div class="resumo-card">
        <h3>📋 Resumo dos palpites</h3>
        <div id="resumoText" class="resumo-texto">Nenhum palpite registrado ainda.</div>
    </div>

    <h2 style="margin-bottom: 6px;">🗓️ JOGOS DA 1ª RODADA</h2>
    <div id="jogosContainer" class="jogos-grid"></div>

    <button id="btnGerarPDF" class="btn-pdf">📄 GERAR PDF DA 1ª RODADA</button>
    <footer>Escolha o vencedor ou empate para cada jogo. Seu progresso é salvo automaticamente.</footer>
</div>

<script>
    // Lista de jogos (igual fornecida)
    const jogosData = [
        { grupo: "Grupo A", timeCasa: "México", timeFora: "África do Sul" },
        { grupo: "Grupo A", timeCasa: "República da Coreia", timeFora: "República Tcheca" },
        { grupo: "Grupo B", timeCasa: "Canadá", timeFora: "Bósnia e Herzegovina" },
        { grupo: "Grupo D", timeCasa: "Estados Unidos", timeFora: "Paraguai" },
        { grupo: "Grupo B", timeCasa: "Catar", timeFora: "Suíça" },
        { grupo: "Grupo C", timeCasa: "Brasil", timeFora: "Marrocos" },
        { grupo: "Grupo C", timeCasa: "Haiti", timeFora: "Escócia" },
        { grupo: "Grupo D", timeCasa: "Austrália", timeFora: "Turquia" },
        { grupo: "Grupo E", timeCasa: "Alemanha", timeFora: "Curaçau" },
        { grupo: "Grupo E", timeCasa: "Costa do Marfim", timeFora: "Equador" },
        { grupo: "Grupo F", timeCasa: "Holanda", timeFora: "Japão" },
        { grupo: "Grupo F", timeCasa: "Suécia", timeFora: "Tunísia" },
        { grupo: "Grupo H", timeCasa: "Espanha", timeFora: "Cabo Verde" },
        { grupo: "Grupo H", timeCasa: "Arábia Saudita", timeFora: "Uruguai" },
        { grupo: "Grupo G", timeCasa: "Bélgica", timeFora: "Egito" },
        { grupo: "Grupo G", timeCasa: "Irã", timeFora: "Nova Zelândia" },
        { grupo: "Grupo J", timeCasa: "Áustria", timeFora: "Jordânia" },
        { grupo: "Grupo I", timeCasa: "França", timeFora: "Senegal" },
        { grupo: "Grupo I", timeCasa: "Iraque", timeFora: "Noruega" },
        { grupo: "Grupo J", timeCasa: "Argentina", timeFora: "Argélia" },
        { grupo: "Grupo K", timeCasa: "Portugal", timeFora: "República Democrática do Congo" },
        { grupo: "Grupo L", timeCasa: "Inglaterra", timeFora: "Croácia" },
        { grupo: "Grupo L", timeCasa: "Gana", timeFora: "Panamá" },
        { grupo: "Grupo K", timeCasa: "Uzbequistão", timeFora: "Colômbia" }
    ];

    // Estrutura: { tipo: "casa" | "fora" | "empate" | null, semPalpite: boolean }
    let palpites = [];

    function carregarPalpitesLocal() {
        const saved = localStorage.getItem("bolao_palpites_rodada1_vencedor");
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(Array.isArray(parsed) && parsed.length === jogosData.length) {
                    palpites = parsed;
                    return;
                }
            } catch(e) {}
        }
        palpites = jogosData.map(() => ({ tipo: null, semPalpite: false }));
    }

    function salvarPalpitesLocal() {
        localStorage.setItem("bolao_palpites_rodada1_vencedor", JSON.stringify(palpites));
    }

    function salvarUsuarioLocal() {
        const nome = document.getElementById("nomeParticipante").value;
        const email = document.getElementById("emailParticipante").value;
        localStorage.setItem("bolao_nome_vencedor", nome);
        localStorage.setItem("bolao_email_vencedor", email);
    }

    function carregarUsuarioLocal() {
        const nomeSalvo = localStorage.getItem("bolao_nome_vencedor") || "";
        const emailSalvo = localStorage.getItem("bolao_email_vencedor") || "";
        document.getElementById("nomeParticipante").value = nomeSalvo;
        document.getElementById("emailParticipante").value = emailSalvo;
    }

    function getPalpiteTexto(palpite, jogo) {
        if(palpite.semPalpite) return "🚫 Sem palpite";
        if(!palpite.tipo) return "⏳ Pendente";
        if(palpite.tipo === "casa") return `🏠 ${jogo.timeCasa}`;
        if(palpite.tipo === "fora") return `✈️ ${jogo.timeFora}`;
        if(palpite.tipo === "empate") return "🤝 Empate";
        return "❓";
    }

    function atualizarResumo() {
        let linhas = [];
        let completos = 0;
        for(let i=0; i<jogosData.length; i++) {
            const jogo = jogosData[i];
            const palpite = palpites[i];
            let status = "";
            if(palpite.semPalpite) {
                status = "🚫 Sem palpite";
            } else if(palpite.tipo) {
                status = getPalpiteTexto(palpite, jogo);
                completos++;
            } else {
                status = "⏳ Aguardando palpite";
            }
            linhas.push(`${jogo.timeCasa} vs ${jogo.timeFora} → ${status}`);
        }
        const totalSem = palpites.filter(p => p.semPalpite).length;
        const header = `✅ Palpites definidos: ${completos} / ${jogosData.length}  |  Sem palpite: ${totalSem}\n`;
        document.getElementById("resumoTexto").innerHTML = header + linhas.join("\n");
    }

    function renderizarJogos() {
        const container = document.getElementById("jogosContainer");
        if(!container) return;
        container.innerHTML = "";
        
        for(let idx = 0; idx < jogosData.length; idx++) {
            const jogo = jogosData[idx];
            const palpiteAtual = palpites[idx];
            
            const card = document.createElement("div");
            card.className = "card-jogo";
            
            // Grupo
            const grupoSpan = document.createElement("div");
            grupoSpan.className = "grupo-badge";
            grupoSpan.innerText = jogo.grupo;
            
            // Nomes dos times
            const nomesDiv = document.createElement("div");
            nomesDiv.className = "jogo-nomes";
            nomesDiv.innerHTML = `<span class="time">${jogo.timeCasa}</span><span class="vs">VS</span><span class="time">${jogo.timeFora}</span>`;
            
            // Opções de palpite
            const opcoesDiv = document.createElement("div");
            opcoesDiv.className = "opcoes-palpite";
            
            const criarOpcao = (valor, texto, extraClass = "") => {
                const btn = document.createElement("div");
                btn.className = `opcao-btn ${extraClass}`;
                btn.innerText = texto;
                btn.setAttribute("data-opcao", valor);
                if(!palpiteAtual.semPalpite && palpiteAtual.tipo === valor) {
                    btn.classList.add("selected");
                }
                btn.addEventListener("click", () => {
                    if(palpiteAtual.semPalpite) return;
                    // Remove selected de todos os botoes desta opcoesDiv
                    Array.from(opcoesDiv.children).forEach(child => child.classList.remove("selected"));
                    btn.classList.add("selected");
                    palpites[idx].tipo = valor;
                    palpites[idx].semPalpite = false;
                    // garantir que checkbox sem palpite desmarque
                    const checkSem = card.querySelector(".check-sem-palpite");
                    if(checkSem) checkSem.checked = false;
                    salvarPalpitesLocal();
                    atualizarResumo();
                });
                return btn;
            };
            
            const btnCasa = criarOpcao("casa", `🏠 ${jogo.timeCasa.substring(0,12)}`, "opcao-casa");
            const btnEmpate = criarOpcao("empate", "🤝 EMPATE", "opcao-empate");
            const btnFora = criarOpcao("fora", `✈️ ${jogo.timeFora.substring(0,12)}`, "opcao-fora");
            
            opcoesDiv.appendChild(btnCasa);
            opcoesDiv.appendChild(btnEmpate);
            opcoesDiv.appendChild(btnFora);
            
            // Sem palpite
            const semDiv = document.createElement("div");
            semDiv.className = "sem-palpite";
            const checkSem = document.createElement("input");
            checkSem.type = "checkbox";
            checkSem.className = "check-sem-palpite";
            checkSem.id = `sem_${idx}`;
            checkSem.checked = palpiteAtual.semPalpite || false;
            const labelSem = document.createElement("label");
            labelSem.htmlFor = `sem_${idx}`;
            labelSem.innerText = "🚫 Sem palpite neste jogo";
            semDiv.appendChild(checkSem);
            semDiv.appendChild(labelSem);
            
            // status adicional
            const statusSpan = document.createElement("div");
            statusSpan.className = "status-palpite";
            function atualizarStatus() {
                if(palpites[idx].semPalpite) statusSpan.innerText = "⚪ Sem palpite marcado";
                else if(palpites[idx].tipo) statusSpan.innerText = `Palpite: ${getPalpiteTexto(palpites[idx], jogo)}`;
                else statusSpan.innerText = "🔘 Selecione um dos botões";
            }
            atualizarStatus();
            
            // evento do checkbox
            checkSem.addEventListener("change", (e) => {
                const isChecked = e.target.checked;
                palpites[idx].semPalpite = isChecked;
                if(isChecked) {
                    palpites[idx].tipo = null;
                    // desmarcar seleção visual dos botões
                    Array.from(opcoesDiv.children).forEach(btn => btn.classList.remove("selected"));
                }
                salvarPalpitesLocal();
                atualizarStatus();
                atualizarResumo();
            });
            
            // também atualizar status quando palpite mudar (já tem nos eventos dos botoes)
            const observer = () => {
                atualizarStatus();
                atualizarResumo();
            };
            // override nos botoes originais? já chamam salvar e resumo, mas vamos adicionar atualizacao de status ali
            // vamos substituir os eventos originais para manter status.
            // mas como ja foi adicionado, vou patch nos botoes para chamar atualização extra.
            const botoes = [btnCasa, btnEmpate, btnFora];
            botoes.forEach(btn => {
                const oldClick = btn.onclick;
                btn.onclick = (e) => {
                    if(palpites[idx].semPalpite) return;
                    Array.from(opcoesDiv.children).forEach(c => c.classList.remove("selected"));
                    btn.classList.add("selected");
                    palpites[idx].tipo = btn.getAttribute("data-opcao");
                    palpites[idx].semPalpite = false;
                    if(checkSem) checkSem.checked = false;
                    salvarPalpitesLocal();
                    atualizarStatus();
                    atualizarResumo();
                };
            });
            
            card.appendChild(grupoSpan);
            card.appendChild(nomesDiv);
            card.appendChild(opcoesDiv);
            card.appendChild(semDiv);
            card.appendChild(statusSpan);
            container.appendChild(card);
        }
        atualizarResumo();
    }
    
    // Gerar PDF (agora com texto descritivo: vencedor ou empate)
    async function gerarPDF() {
        const nome = document.getElementById("nomeParticipante").value.trim();
        const email = document.getElementById("emailParticipante").value.trim();
        if(nome === "" || email === "") {
            alert("⚠️ Preencha NOME e E-MAIL para gerar o PDF.");
            return;
        }
        salvarUsuarioLocal();
        
        const now = new Date();
        const dataStr = now.toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });
        
        let linhasTabela = "";
        let completosCount = 0;
        for(let i=0; i<jogosData.length; i++) {
            const j = jogosData[i];
            const p = palpites[i];
            let palpiteDesc = "";
            if(p.semPalpite) {
                palpiteDesc = "🚫 Sem palpite";
            } else if(p.tipo === "casa") {
                palpiteDesc = `🏆 ${j.timeCasa}`;
                completosCount++;
            } else if(p.tipo === "fora") {
                palpiteDesc = `🏆 ${j.timeFora}`;
                completosCount++;
            } else if(p.tipo === "empate") {
                palpiteDesc = "🤝 Empate";
                completosCount++;
            } else {
                palpiteDesc = "❌ Não informado";
            }
            linhasTabela += `
                <tr style="border-bottom:1px solid #ddd;">
                    <td style="padding:8px; font-size:11px;">${j.grupo}</td>
                    <td style="padding:8px;">${j.timeCasa} 🆚 ${j.timeFora}</td>
                    <td style="padding:8px; text-align:center; font-weight:bold;">${palpiteDesc}</td>
                </tr>
            `;
        }
        const totalSem = palpites.filter(p => p.semPalpite).length;
        
        const pdfHtml = `
            <div style="font-family: 'Segoe UI', Arial, sans-serif; width:100%; background: white; padding: 20px;">
                <div style="text-align: center; border-bottom: 3px solid #ffcc00; margin-bottom: 20px;">
                    <h1 style="color: #1f3b2c;">🏆 BOLÃO COPA 2026 - 1ª RODADA</h1>
                    <p><strong>Participante:</strong> ${nome} (${email})</p>
                    <p><strong>Data:</strong> ${dataStr}</p>
                    <p><strong>Regra:</strong> Palpite no VENCEDOR ou EMPATE</p>
                </div>
                <div style="margin: 10px 0; background:#f4f0e0; padding: 8px; border-radius: 16px; text-align:center;">
                    ✅ Palpites realizados: ${completosCount} / ${jogosData.length} &nbsp;&nbsp;| 🚫 Sem palpite: ${totalSem}
                </div>
                <table style="width:100%; border-collapse: collapse; margin-top: 12px;">
                    <thead>
                        <tr><th style="background:#ffcc00; padding:10px; text-align:left;">Grupo</th>
                            <th style="background:#ffcc00; padding:10px; text-align:left;">Jogo</th>
                            <th style="background:#ffcc00; padding:10px; text-align:center;">Palpite (Vencedor/Empate)</th>
                        </tr>
                    </thead>
                    <tbody>${linhasTabela}</tbody>
                </table>
                <div style="margin-top: 30px; text-align: center; font-size: 10px; color: gray; border-top: 1px solid #ccc; padding-top: 12px;">
                    Documento gerado pelo Bolão Amigos • Copa do Mundo 2026 • 1ª Rodada • Palpite simples
                </div>
            </div>
        `;
        
        const previewDiv = document.createElement("div");
        previewDiv.style.position = "fixed";
        previewDiv.style.top = "-9999px";
        previewDiv.style.left = "-9999px";
        previewDiv.style.background = "white";
        previewDiv.innerHTML = pdfHtml;
        document.body.appendChild(previewDiv);
        
        try {
            const element = previewDiv.firstChild;
            const canvas = await html2canvas(element, { scale: 2, backgroundColor: "#ffffff" });
            const imgData = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
            const imgWidth = 210;
            const pageHeight = 297;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let position = 0;
            pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
            let heightLeft = imgHeight - pageHeight;
            if (heightLeft > 0) {
                position = -pageHeight;
                while (heightLeft > 0) {
                    pdf.addPage();
                    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                    position -= pageHeight;
                }
            }
            const nomeArquivo = `bolao_${nome.replace(/[^a-z0-9]/gi, '_')}_rodada1_vencedor.pdf`;
            pdf.save(nomeArquivo);
        } catch(err) {
            console.error(err);
            alert("Erro ao gerar PDF. Tente novamente.");
        } finally {
            document.body.removeChild(previewDiv);
        }
    }
    
    function bindEvents() {
        const nomeInput = document.getElementById("nomeParticipante");
        const emailInput = document.getElementById("emailParticipante");
        nomeInput.addEventListener("input", salvarUsuarioLocal);
        emailInput.addEventListener("input", salvarUsuarioLocal);
        document.getElementById("btnGerarPDF").addEventListener("click", gerarPDF);
    }
    
    function init() {
        carregarPalpitesLocal();
        carregarUsuarioLocal();
        renderizarJogos();
        bindEvents();
        // Garantir que o resumo tenha o elemento correto
        if(!document.getElementById("resumoTexto")) {
            const el = document.getElementById("resumoText");
            if(el) el.id = "resumoTexto";
        } else {
            document.getElementById("resumoTexto").id = "resumoTexto";
        }
        atualizarResumo();
    }
    
    init();
</script>
</body>
</html>
