<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bolão Copa 2026 - 1ª Rodada</title>
    <!-- Bibliotecas para geração de PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #1a472a 0%, #0e2a1a 100%);
            padding: 30px 20px;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: #fef9e8;
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 20px 25px 40px 25px;
            transition: all 0.2s;
        }

        /* cabeçalho */
        .header {
            text-align: center;
            border-bottom: 4px solid #ffcc00;
            margin-bottom: 30px;
            padding-bottom: 20px;
        }
        .header h1 {
            font-size: 2.2rem;
            color: #1f3b2c;
            letter-spacing: -0.5px;
        }
        .header h1 span {
            background: #ffcc00;
            padding: 0 12px;
            border-radius: 40px;
            display: inline-block;
        }
        .header p {
            color: #2c5a3b;
            font-weight: 500;
            margin-top: 8px;
        }

        /* form dados usuario */
        .user-area {
            background: #e9f0e5;
            padding: 18px 22px;
            border-radius: 36px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .input-group {
            flex: 1;
            min-width: 200px;
        }
        .input-group label {
            font-weight: bold;
            color: #1f3b2c;
            display: block;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #bfd9b0;
            background: white;
            font-size: 1rem;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #ffcc00;
            box-shadow: 0 0 0 3px rgba(255,204,0,0.3);
        }

        /* resumo dos palpites */
        .resumo-card {
            background: #ffffffdd;
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 18px 22px;
            margin-bottom: 28px;
            border-left: 8px solid #ffcc00;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
        }
        .resumo-card h3 {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            color: #1f3b2c;
        }
        .resumo-texto {
            background: #f4f2e7;
            padding: 14px;
            border-radius: 24px;
            margin-top: 12px;
            font-family: monospace;
            font-size: 0.9rem;
            max-height: 180px;
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* grade de jogos */
        .jogos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin: 25px 0 30px;
        }
        .card-jogo {
            background: white;
            border-radius: 28px;
            padding: 14px 18px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.1);
            transition: transform 0.1s ease;
            border: 1px solid #e0dccf;
        }
        .grupo-badge {
            font-size: 0.7rem;
            background: #2c5a3b;
            color: white;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .jogo-nomes {
            font-weight: 800;
            font-size: 1.1rem;
            margin: 8px 0 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .time {
            background: #faf4e0;
            padding: 4px 8px;
            border-radius: 20px;
        }
        .placar-inputs {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-top: 10px;
        }
        .placar-inputs input {
            width: 70px;
            padding: 10px;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 20px;
            border: 1px solid #ccc;
        }
        .vs {
            font-weight: bold;
            background: #ffcc00;
            padding: 4px 10px;
            border-radius: 30px;
        }
        .sem-palpite {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            justify-content: flex-end;
        }
        .sem-palpite label {
            font-size: 0.8rem;
            font-weight: normal;
            cursor: pointer;
        }
        button {
            background: #ffcc00;
            border: none;
            padding: 14px 28px;
            font-weight: bold;
            font-size: 1.1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: 0.2s;
            color: #1f3b2c;
            box-shadow: 0 2px 6px rgba(0,0,0,0.2);
        }
        button:hover {
            background: #e6b800;
            transform: scale(1.01);
        }
        .btn-pdf {
            background: #1f3b2c;
            color: #ffcc00;
            width: 100%;
            padding: 16px;
            font-size: 1.3rem;
            margin-top: 10px;
        }
        .btn-pdf:hover {
            background: #143120;
        }
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 0.75rem;
            color: #5f7355;
        }
        @media (max-width: 700px) {
            .container { padding: 15px; }
            .jogo-nomes { font-size: 0.9rem; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>⚽ BOLÃO <span>COPA 2026</span> 🏆</h1>
        <p>1ª Rodada • Palpites entre amigos • Gere seu PDF oficial</p>
    </div>

    <!-- dados do participante -->
    <div class="user-area">
        <div class="input-group">
            <label>👤 Seu nome completo</label>
            <input type="text" id="nomeParticipante" placeholder="Ex: João Silva" autocomplete="off">
        </div>
        <div class="input-group">
            <label>📧 E-mail (para identificação)</label>
            <input type="email" id="emailParticipante" placeholder="joao@email.com">
        </div>
    </div>

    <!-- resumo dinâmico -->
    <div class="resumo-card">
        <h3>📋 Resumo dos palpites (ao vivo)</h3>
        <div id="resumoText" class="resumo-texto">Nenhum palpite registrado ainda. Preencha os jogos abaixo.</div>
    </div>

    <!-- grade de jogos -->
    <h2 style="margin-bottom: 6px;">🗓️ JOGOS DA 1ª RODADA</h2>
    <div id="jogosContainer" class="jogos-grid"></div>

    <!-- botão gerar PDF -->
    <button id="btnGerarPDF" class="btn-pdf">📄 GERAR PDF DA 1ª RODADA</button>
    <footer>Após preencher todos palpites, clique em GERAR PDF. Seu progresso é salvo automaticamente.</footer>
</div>

<script>
    // ---------- LISTA DE JOGOS (ordem cronológica igual fornecida) ----------
    const jogosData = [
        { grupo: "Grupo A", timeCasa: "México", timeFora: "África do Sul" },
        { grupo: "Grupo A", timeCasa: "República da Coreia", timeFora: "República Tcheca" },
        { grupo: "Grupo B", timeCasa: "Canadá", timeFora: "Bósnia e Herzegovina" },
        { grupo: "Grupo D", timeCasa: "Estados Unidos", timeFora: "Paraguai" },
        { grupo: "Grupo B", timeCasa: "Catar", timeFora: "Suíça" },
        { grupo: "Grupo C", timeCasa: "Brasil", timeFora: "Marrocos" },
        { grupo: "Grupo C", timeCasa: "Haiti", timeFora: "Escócia" },
        { grupo: "Grupo D", timeCasa: "Austrália", timeFora: "Turquia" },
        { grupo: "Grupo E", timeCasa: "Alemanha", timeFora: "Curaçau" },
        { grupo: "Grupo E", timeCasa: "Costa do Marfim", timeFora: "Equador" },
        { grupo: "Grupo F", timeCasa: "Holanda", timeFora: "Japão" },
        { grupo: "Grupo F", timeCasa: "Suécia", timeFora: "Tunísia" },
        { grupo: "Grupo H", timeCasa: "Espanha", timeFora: "Cabo Verde" },
        { grupo: "Grupo H", timeCasa: "Arábia Saudita", timeFora: "Uruguai" },
        { grupo: "Grupo G", timeCasa: "Bélgica", timeFora: "Egito" },
        { grupo: "Grupo G", timeCasa: "Irã", timeFora: "Nova Zelândia" },
        { grupo: "Grupo J", timeCasa: "Áustria", timeFora: "Jordânia" },
        { grupo: "Grupo I", timeCasa: "França", timeFora: "Senegal" },
        { grupo: "Grupo I", timeCasa: "Iraque", timeFora: "Noruega" },
        { grupo: "Grupo J", timeCasa: "Argentina", timeFora: "Argélia" },
        { grupo: "Grupo K", timeCasa: "Portugal", timeFora: "República Democrática do Congo" },
        { grupo: "Grupo L", timeCasa: "Inglaterra", timeFora: "Croácia" },
        { grupo: "Grupo L", timeCasa: "Gana", timeFora: "Panamá" },
        { grupo: "Grupo K", timeCasa: "Uzbequistão", timeFora: "Colômbia" }
    ];

    // ---------- Estrutura de estado: palpites ----------
    // cada palpite: { casa: string (gols ou ''), fora: string, semPalpite: boolean }
    let palpites = [];

    // carregar do localStorage ou inicializar vazio
    function carregarPalpitesLocal() {
        const saved = localStorage.getItem("bolao_palpites_rodada1");
        if(saved) {
            try {
                const parsed = JSON.parse(saved);
                if(Array.isArray(parsed) && parsed.length === jogosData.length) {
                    palpites = parsed;
                    return;
                }
            } catch(e) {}
        }
        // inicialização padrão (tudo vazio, semPalpite false)
        palpites = jogosData.map(() => ({ casa: "", fora: "", semPalpite: false }));
    }

    function salvarPalpitesLocal() {
        localStorage.setItem("bolao_palpites_rodada1", JSON.stringify(palpites));
    }

    // salvar nome/email também
    function salvarUsuarioLocal() {
        const nome = document.getElementById("nomeParticipante").value;
        const email = document.getElementById("emailParticipante").value;
        localStorage.setItem("bolao_nome", nome);
        localStorage.setItem("bolao_email", email);
    }

    function carregarUsuarioLocal() {
        const nomeSalvo = localStorage.getItem("bolao_nome") || "";
        const emailSalvo = localStorage.getItem("bolao_email") || "";
        document.getElementById("nomeParticipante").value = nomeSalvo;
        document.getElementById("emailParticipante").value = emailSalvo;
    }

    // atualiza resumo dinâmico em tela
    function atualizarResumo() {
        let preenchidos = 0;
        let linhas = [];
        for(let i=0; i<jogosData.length; i++) {
            const jogo = jogosData[i];
            const palpite = palpites[i];
            let placarStr = "";
            if(palpite.semPalpite) {
                placarStr = "⚪ Sem palpite";
            } else if(palpite.casa !== "" && palpite.fora !== "") {
                placarStr = `${palpite.casa} x ${palpite.fora}`;
                preenchidos++;
            } else if(palpite.casa !== "" || palpite.fora !== "") {
                placarStr = "⚠️ Incompleto";
            } else {
                placarStr = "⏳ Aguardando palpite";
            }
            if(placarStr !== "⏳ Aguardando palpite" || palpite.casa !== "" || palpite.fora !== "") {
                linhas.push(`${jogo.timeCasa} vs ${jogo.timeFora} → ${placarStr}`);
            } else {
                linhas.push(`${jogo.timeCasa} vs ${jogo.timeFora} → sem palpite ainda`);
            }
        }
        const totalCompletos = palpites.filter(p => !p.semPalpite && p.casa !== "" && p.fora !== "").length;
        const totalSem = palpites.filter(p => p.semPalpite).length;
        const header = `✅ Palpites completos: ${totalCompletos} / ${jogosData.length}  |  Sem palpite: ${totalSem}\n`;
        document.getElementById("resumoText").innerHTML = header + linhas.slice(0, 12).join("\n") + (linhas.length > 12 ? "\n... (+ mais jogos)" : "");
    }

    // renderizar toda interface dos jogos
    function renderizarJogos() {
        const container = document.getElementById("jogosContainer");
        if(!container) return;
        container.innerHTML = "";
        for(let idx = 0; idx < jogosData.length; idx++) {
            const jogo = jogosData[idx];
            const palpiteAtual = palpites[idx];
            const card = document.createElement("div");
            card.className = "card-jogo";
            card.setAttribute("data-idx", idx);
            
            // badge grupo
            const grupoSpan = document.createElement("div");
            grupoSpan.className = "grupo-badge";
            grupoSpan.innerText = jogo.grupo;
            
            const nomesDiv = document.createElement("div");
            nomesDiv.className = "jogo-nomes";
            nomesDiv.innerHTML = `<span class="time">${jogo.timeCasa}</span> <span>🆚</span> <span class="time">${jogo.timeFora}</span>`;
            
            const placarDiv = document.createElement("div");
            placarDiv.className = "placar-inputs";
            const inputCasa = document.createElement("input");
            inputCasa.type = "number";
            inputCasa.placeholder = "0";
            inputCasa.min = "0";
            inputCasa.max = "30";
            inputCasa.value = palpiteAtual.semPalpite ? "" : (palpiteAtual.casa !== undefined ? palpiteAtual.casa : "");
            inputCasa.disabled = palpiteAtual.semPalpite;
            inputCasa.classList.add("gols-casa");
            
            const vsSpan = document.createElement("span");
            vsSpan.className = "vs";
            vsSpan.innerText = "X";
            
            const inputFora = document.createElement("input");
            inputFora.type = "number";
            inputFora.placeholder = "0";
            inputFora.min = "0";
            inputFora.max = "30";
            inputFora.value = palpiteAtual.semPalpite ? "" : (palpiteAtual.fora !== undefined ? palpiteAtual.fora : "");
            inputFora.disabled = palpiteAtual.semPalpite;
            inputFora.classList.add("gols-fora");
            
            placarDiv.appendChild(inputCasa);
            placarDiv.appendChild(vsSpan);
            placarDiv.appendChild(inputFora);
            
            const semDiv = document.createElement("div");
            semDiv.className = "sem-palpite";
            const checkSem = document.createElement("input");
            checkSem.type = "checkbox";
            checkSem.id = `sem_${idx}`;
            checkSem.checked = palpiteAtual.semPalpite || false;
            const labelSem = document.createElement("label");
            labelSem.htmlFor = `sem_${idx}`;
            labelSem.innerText = "🚫 Sem palpite neste jogo";
            semDiv.appendChild(checkSem);
            semDiv.appendChild(labelSem);
            
            card.appendChild(grupoSpan);
            card.appendChild(nomesDiv);
            card.appendChild(placarDiv);
            card.appendChild(semDiv);
            
            // Eventos para atualizar o estado
            function updateFromInputs() {
                const isChecked = checkSem.checked;
                const casaVal = isChecked ? "" : inputCasa.value;
                const foraVal = isChecked ? "" : inputFora.value;
                palpites[idx].semPalpite = isChecked;
                palpites[idx].casa = isChecked ? "" : (casaVal === "" ? "" : String(parseInt(casaVal) || 0));
                palpites[idx].fora = isChecked ? "" : (foraVal === "" ? "" : String(parseInt(foraVal) || 0));
                // se não tem palpite, limpa os valores de gols
                if(isChecked) {
                    inputCasa.value = "";
                    inputFora.value = "";
                } else {
                    if(palpites[idx].casa === "") palpites[idx].casa = "";
                    if(palpites[idx].fora === "") palpites[idx].fora = "";
                    inputCasa.value = palpites[idx].casa !== "" ? palpites[idx].casa : "";
                    inputFora.value = palpites[idx].fora !== "" ? palpites[idx].fora : "";
                }
                inputCasa.disabled = isChecked;
                inputFora.disabled = isChecked;
                salvarPalpitesLocal();
                atualizarResumo();
            }
            
            inputCasa.addEventListener("input", () => {
                if(checkSem.checked) return;
                let val = inputCasa.value;
                if(val !== "") val = Math.max(0, parseInt(val) || 0);
                palpites[idx].casa = val === "" ? "" : String(val);
                palpites[idx].semPalpite = false;
                checkSem.checked = false;
                inputFora.disabled = false;
                inputCasa.disabled = false;
                salvarPalpitesLocal();
                atualizarResumo();
            });
            
            inputFora.addEventListener("input", () => {
                if(checkSem.checked) return;
                let val = inputFora.value;
                if(val !== "") val = Math.max(0, parseInt(val) || 0);
                palpites[idx].fora = val === "" ? "" : String(val);
                palpites[idx].semPalpite = false;
                checkSem.checked = false;
                inputCasa.disabled = false;
                inputFora.disabled = false;
                salvarPalpitesLocal();
                atualizarResumo();
            });
            
            checkSem.addEventListener("change", (e) => {
                const isChecked = e.target.checked;
                palpites[idx].semPalpite = isChecked;
                if(isChecked) {
                    palpites[idx].casa = "";
                    palpites[idx].fora = "";
                    inputCasa.value = "";
                    inputFora.value = "";
                } else {
                    // ao desmarcar, mantém valores atuais dos inputs
                    let casaVal = inputCasa.value;
                    let foraVal = inputFora.value;
                    if(casaVal !== "") palpites[idx].casa = String(parseInt(casaVal) || 0);
                    if(foraVal !== "") palpites[idx].fora = String(parseInt(foraVal) || 0);
                    if(casaVal === "") palpites[idx].casa = "";
                    if(foraVal === "") palpites[idx].fora = "";
                }
                inputCasa.disabled = isChecked;
                inputFora.disabled = isChecked;
                if(!isChecked && (inputCasa.value === "" || inputFora.value === "")) {
                    // se estiver vazio, não força número
                }
                salvarPalpitesLocal();
                atualizarResumo();
            });
            
            container.appendChild(card);
        }
        atualizarResumo();
    }
    
    // função para gerar o PDF usando html2canvas e jsPDF (com conteúdo customizado e elegante)
    async function gerarPDF() {
        const nome = document.getElementById("nomeParticipante").value.trim();
        const email = document.getElementById("emailParticipante").value.trim();
        if(nome === "" || email === "") {
            alert("⚠️ Por favor, preencha seu NOME e E-MAIL antes de gerar o PDF.");
            return;
        }
        salvarUsuarioLocal();
        
        // Construir elemento HTML temporário para o PDF (com estilo e tabela de palpites)
        const now = new Date();
        const dataStr = now.toLocaleString("pt-BR", { timeZone: "America/Sao_Paulo" });
        
        // montar lista de palpites formatada
        let linhasTabela = "";
        for(let i=0; i<jogosData.length; i++) {
            const j = jogosData[i];
            const p = palpites[i];
            let palpiteTexto = "";
            if(p.semPalpite) {
                palpiteTexto = "🚫 Sem palpite";
            } else if(p.casa !== "" && p.fora !== "") {
                palpiteTexto = `${p.casa} x ${p.fora}`;
            } else if(p.casa !== "" || p.fora !== "") {
                palpiteTexto = "⚠️ Incompleto";
            } else {
                palpiteTexto = "❌ Não informado";
            }
            linhasTabela += `
                <tr style="border-bottom:1px solid #ddd;">
                    <td style="padding:8px; font-size:11px;">${j.grupo}</td>
                    <td style="padding:8px;">${j.timeCasa} vs ${j.timeFora}</td>
                    <td style="padding:8px; text-align:center; font-weight:bold;">${palpiteTexto}</td>
                </tr>
            `;
        }
        
        const totalCompletos = palpites.filter(p => !p.semPalpite && p.casa !== "" && p.fora !== "").length;
        const totalSem = palpites.filter(p => p.semPalpite).length;
        
        const pdfHtml = `
            <div id="pdfContentWrapper" style="font-family: 'Segoe UI', Arial, sans-serif; width:100%; max-width:1000px; background: white; padding: 20px; border-radius: 24px;">
                <div style="text-align: center; border-bottom: 3px solid #ffcc00; margin-bottom: 20px;">
                    <h1 style="color: #1f3b2c;">🏆 BOLÃO COPA 2026 - 1ª RODADA</h1>
                    <p><strong>Participante:</strong> ${nome} (${email})</p>
                    <p><strong>Data de geração:</strong> ${dataStr}</p>
                </div>
                <div style="margin: 15px 0; background: #f4f0e0; border-radius: 20px; padding: 10px;">
                    <span>✅ Palpites completos: ${totalCompletos} / ${jogosData.length} &nbsp;&nbsp;| 🚫 Sem palpite: ${totalSem}</span>
                </div>
                <table style="width:100%; border-collapse: collapse; margin-top: 10px;">
                    <thead>
                        <tr><th style="background:#ffcc00; padding:10px; text-align:left;">Grupo</th>
                            <th style="background:#ffcc00; padding:10px; text-align:left;">Jogo</th>
                            <th style="background:#ffcc00; padding:10px; text-align:center;">Palpite</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${linhasTabela}
                    </tbody>
                </table>
                <div style="margin-top: 30px; text-align: center; font-size: 10px; color: gray; border-top: 1px solid #ccc; padding-top: 12px;">
                    Documento gerado pelo Bolão Amigos • Copa do Mundo 2026 • 1ª Rodada
                </div>
            </div>
        `;
        
        // Criar um iframe ou div oculta para renderizar e capturar
        const previewDiv = document.createElement("div");
        previewDiv.style.position = "fixed";
        previewDiv.style.top = "-9999px";
        previewDiv.style.left = "-9999px";
        previewDiv.style.backgroundColor = "white";
        previewDiv.innerHTML = pdfHtml;
        document.body.appendChild(previewDiv);
        
        try {
            const element = previewDiv.firstChild;
            const canvas = await html2canvas(element, { scale: 2, logging: false, useCORS: false, backgroundColor: "#ffffff" });
            const imgData = canvas.toDataURL("image/png");
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
            const imgWidth = 210; // A4 largura mm
            const pageHeight = 297;
            const imgHeight = (canvas.height * imgWidth) / canvas.width;
            let position = 0;
            pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
            let heightLeft = imgHeight - pageHeight;
            if (heightLeft > 0) {
                position = -pageHeight;
                while (heightLeft > 0) {
                    pdf.addPage();
                    pdf.addImage(imgData, "PNG", 0, position, imgWidth, imgHeight);
                    heightLeft -= pageHeight;
                    position -= pageHeight;
                }
            }
            const nomeArquivo = `bolao_${nome.replace(/[^a-z0-9]/gi, '_')}_rodada1.pdf`;
            pdf.save(nomeArquivo);
        } catch(err) {
            console.error(err);
            alert("Erro ao gerar PDF. Tente novamente.");
        } finally {
            document.body.removeChild(previewDiv);
        }
    }
    
    // sincronizar dados com inputs e localstorage quando usuario digitar nome/email
    function bindUserEvents() {
        const nomeInput = document.getElementById("nomeParticipante");
        const emailInput = document.getElementById("emailParticipante");
        nomeInput.addEventListener("input", salvarUsuarioLocal);
        emailInput.addEventListener("input", salvarUsuarioLocal);
    }
    
    // Inicialização completa
    function init() {
        carregarPalpitesLocal();
        carregarUsuarioLocal();
        renderizarJogos();
        bindUserEvents();
        // garantir que se alterar fora do escopo, salve ao clicar no PDF também, mas já atualiza resumo a cada evento
        const btnPDF = document.getElementById("btnGerarPDF");
        btnPDF.addEventListener("click", gerarPDF);
    }
    
    init();
</script>
</body>
</html>
